name: hosts

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day.
    - cron: "0 0,6,12,18 * * *"

  workflow_dispatch:
    inputs:
      dns:
        description: "DNS"
        required: true
        default: "Sunrise"
        type: choice
        options:
          - "Google"
          - "OpenDNS"
          - "AT&T"
          - "Sunrise"
          - "Aliyun"
          - "LG"
          - "IONICA"

jobs:
  hosts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"
          python -m pip install --upgrade pip setuptools
          # 安装 dnspython 用于直接 DNS 查询
          python -m pip install dnspython

      - name: Get Github Hosts
        shell: python
        run: |
          import os, time, dns.resolver

          # DNS 服务器 IP 映射表（与 workflow_dispatch 中的选项对应）
          
          DNS_SERVERS = {
              "Google": "8.8.8.8",                    // ✓ 正确 (备用: 8.8.4.4)
              "OpenDNS": "208.67.222.222",            // ✓ 正确 (备用: 208.67.220.220)
              "AT&T": "68.94.156.1",                  // ✗ 修正: 原 208.67.220.220 是 OpenDNS 的备用 DNS
              "Sunrise": "194.158.243.178",           // ✗ 修正: 原 194.150.168.168 不是 Sunrise 官方 DNS
              "Aliyun": "223.5.5.5",                  // ✓ 正确 (备用: 223.6.6.6)
              "LG U+": "164.124.101.2",               // ✓ 正确 (韩国 LG U+, 备用: 203.248.252.2)
              "Yandex": "77.88.8.8"                   // ✗ 修正: 原 IONICA 错误，实为 Yandex DNS (俄罗斯)
          }

          # 获取用户选择的 DNS 服务器名称（默认为 Sunrise）
          selected_dns = '${{ inputs.dns }}'
          if selected_dns not in DNS_SERVERS:
              selected_dns = 'Sunrise'
          dns_ip = DNS_SERVERS[selected_dns]

          # 配置 DNS 解析器
          resolver = dns.resolver.Resolver()
          resolver.nameservers = [dns_ip]
          resolver.timeout = 5
          resolver.lifetime = 5

          # 域名列表（与原始脚本完全一致）
          gitHubDoMains = [
              "github.io",
              "github.com",
              "github.blog",
              "github.community",
              "api.github.com",
              "api.githubcopilot.com",
              "gist.github.com",
              "codeload.github.com",
              "central.github.com",
              "collector.github.com",
              "raw.github.com",
              "docs.github.com",
              "assets-cdn.github.com",
              "raw.githubusercontent.com",
              "camo.githubusercontent.com",
              "cloud.githubusercontent.com",
              "media.githubusercontent.com",
              "desktop.githubusercontent.com",
              "objects.githubusercontent.com",
              "favicons.githubusercontent.com",
              "avatars5.githubusercontent.com",
              "avatars4.githubusercontent.com",
              "avatars3.githubusercontent.com",
              "avatars2.githubusercontent.com",
              "avatars1.githubusercontent.com",
              "avatars0.githubusercontent.com",
              "avatars.githubusercontent.com",
              "user-images.githubusercontent.com",
              "copilot-proxy.githubusercontent.com",
              "github-releases.githubusercontent.com",
              "pipelines.actions.githubusercontent.com",
              "pipelinesghubeus7.actions.githubusercontent.com",
              "githubstatus.com",
              "collector.githubapp.com",
              "github.githubassets.com",
              "analytics.githubassets.com",
              "github.map.fastly.net",
              "github.global.ssl.fastly.net",
              "github-cloud.s3.amazonaws.com",
              "github-com.s3.amazonaws.com",
              "github-production-release-asset-2e65be.s3.amazonaws.com",
              "github-production-user-asset-6210df.s3.amazonaws.com",
              "github-production-repository-file-5c1aeb.s3.amazonaws.com"
          ]

          dockerDoMains = [
              "registry.hub.docker.com",
              "hub.docker.com",
              "ghcr.io",
              "gcr.io",
              "k8s.gcr.io",
              "quay.io"
          ]

          tMMDoMains = [
              "themoviedb.org",
              "www.themoviedb.org",
              "api.themoviedb.org",
              "tmdb.org",
              "api.tmdb.org",
              "image.tmdb.org",
              "opensubtitles.org",
              "www.opensubtitles.org",
              "api.opensubtitles.org",
              "assets.fanart.tv"
          ]

          def get_a_records(domain):
              """查询域名的 A 记录，返回 IP 列表（出错时返回空列表）"""
              try:
                  answers = resolver.resolve(domain, 'A')
                  return [str(r) for r in answers]
              except Exception as e:
                  print(f"Error resolving {domain}: {e}")
                  return []

          # 构建 hosts 文件内容
          dnsList = []
          dnsList.append('# ING Hosts Start')
          dnsList.append('# Raw Url: https://raw.githubusercontent.com/fxcl/hosts/main/hosts')
          dnsList.append('# CDN Url: https://gcore.jsdelivr.net/gh/fxcl/hosts@main/hosts')
          dnsList.append('# CDN Url: https://cdn.staticaly.com/gh/fxcl/hosts/main/hosts')
          dnsList.append(f'# DNS Servers: {selected_dns} ({dns_ip})')
          dnsList.append(f'# Update at: {time.strftime("%Y-%m-%d %H:%M:%S")}')

          # GitHub 域名
          dnsList.append('# GitHub Hosts Start')
          for domain in gitHubDoMains:
              ips = get_a_records(domain)
              if ips:
                  # 只取第一个 IP，保持与原脚本一致
                  dnsList.append(f'{ips[0].ljust(16)}{domain}')
          dnsList.append('# GitHub Hosts End')

          # Docker 域名
          dnsList.append('# Docker Hosts Start')
          for domain in dockerDoMains:
              ips = get_a_records(domain)
              if ips:
                  dnsList.append(f'{ips[0].ljust(16)}{domain}')
          dnsList.append('# Docker Hosts End')

          # TMM 域名
          dnsList.append('# TMM Hosts Start')
          for domain in tMMDoMains:
              ips = get_a_records(domain)
              if ips:
                  dnsList.append(f'{ips[0].ljust(16)}{domain}')
          dnsList.append('# TMM Hosts End')

          dnsList.append('# ING Hosts End')

          # 写入文件
          with open('hosts', 'w', encoding="utf-8") as f:
              f.write('\n'.join(dnsList))

      - name: Check and Push
        run: |
          if [ -n "$(git status -s | grep hosts)" ]; then
            git add hosts
            git commit -m "update $(date +%Y-%m-%d" "%H:%M:%S)"
            git push -f
          fi
